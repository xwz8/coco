<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>优优背单词</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="优优背单词">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4cd964">
<style>
/* ══ 全局变量 ══ */
:root {
    --green: #4cd964; --green-dark: #3ab852; --green-bg: #e8f8ea;
    --red: #ff3b30; --red-bg: #fff0ef;
    --orange: #ff9500; --blue: #007aff;
    --bg: #f5f5f5; --card: #fff;
    --text: #222; --text2: #666; --text3: #999;
    --border: #f0f0f0;
    --admin-bg: #f2f2f7; --admin-border: #e5e5ea;
    --sidebar-w: 260px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); overflow: hidden;
}
svg { display: inline-block; vertical-align: middle; fill: currentColor; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* ══ Toast ══ */
.toast {
    position: fixed; top: -50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: #fff; padding: 10px 24px;
    border-radius: 20px; font-size: 13px; font-weight: 500;
    z-index: 9999; transition: top 0.35s cubic-bezier(.4,0,.2,1);
    white-space: nowrap; pointer-events: none;
}
.toast.show { top: 20px; }

/* ══════════════════════════════════════════
   学习视图
══════════════════════════════════════════ */
#viewApp {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
}
.app-shell {
    width: 100%; margin: 0 auto;
    background: var(--bg); height: 100%;
    display: flex; flex-direction: column; overflow: hidden;
}
@media (min-width: 600px) {
    body { background: linear-gradient(135deg,#43e97b 0%,#38f9d7 100%); padding: 16px; }
    #viewApp { height: 100vh; align-items: center; justify-content: center; }
    .app-shell { max-width: 700px; height: calc(100vh - 32px); border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,.1); }
    .word-row  { padding: 16px 24px; }
    .word-en   { font-size: 18px; }
    .word-def  { font-size: 16px; }
    .act-btn   { width: 38px; height: 38px; }
    .header    { padding: 16px 24px 0; }
    .tabs      { margin: 0 24px 16px; }
    .toolbar   { padding: 10px 24px; }
}
@media (min-width: 1025px) {
    body { padding: 24px 0; }
    .app-shell { max-width: 720px; height: calc(100vh - 48px); }
    .word-row  { padding: 16px 20px; }
    .word-en   { font-size: 17px; }
    .word-def  { font-size: 15px; }
    .act-btn   { width: 36px; height: 36px; }
    .header    { padding: 14px 16px 0; }
    .tabs      { margin: 0 16px 14px; }
    .toolbar   { padding: 10px 16px; }
}
.header { background: var(--green); padding: 14px 16px 0; flex-shrink: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: center; padding-bottom: 14px; position: relative; }
.header-title { color: #fff; font-size: 17px; font-weight: 600; letter-spacing: .5px; }
.header-actions { position: absolute; right: 0; display: flex; gap: 6px; }
.header-btn {
    background: rgba(255,255,255,.2); border: none; color: #fff;
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background .2s;
}
.header-btn:hover { background: rgba(255,255,255,.35); }
.header-btn svg { width: 18px; height: 18px; }
.tabs {
    display: flex; background: rgba(255,255,255,.2);
    border-radius: 10px; padding: 3px; margin: 0 16px 14px;
}
.tab {
    flex: 1; text-align: center; padding: 8px 0; font-size: 13px;
    color: rgba(255,255,255,.85); border-radius: 8px; cursor: pointer;
    font-weight: 500; transition: all .25s; border: none; background: none;
    display: flex; align-items: center; justify-content: center; gap: 4px;
}
.tab.active { background: #fff; color: var(--green); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.tab-count { font-size: 11px; opacity: .8; background: rgba(255,255,255,.25); padding: 1px 6px; border-radius: 8px; font-weight: 600; }
.tab.active .tab-count { background: rgba(76,217,100,.12); color: var(--green); opacity: 1; }
.toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; background: var(--card);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tool-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 14px; background: var(--bg); border: 1px solid #e5e5e5;
    border-radius: 20px; font-size: 12px; color: var(--text2);
    cursor: pointer; transition: all .2s; white-space: nowrap;
}
.tool-btn:hover { border-color: var(--green); color: var(--green); }
.tool-btn svg { width: 14px; height: 14px; }
.tool-spacer { flex: 1; }
.tool-hint { font-size: 11px; color: var(--text3); }
.word-list { background: var(--card); flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.word-row {
    display: flex; align-items: center; padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    transition: background .25s, opacity .3s, transform .3s; min-height: 54px;
}
.word-row.mastered  { background: var(--green-bg); }
.word-row.difficult { background: var(--red-bg); }
.word-row.quiz-row  { cursor: pointer; }
.word-row.quiz-row.revealed { background: #E8F5F2; }
.word-row.fade-out  { opacity: 0; transform: translateX(40px); }
.word-info { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.word-en   { font-size: 16px; font-weight: 600; color: var(--text); flex-shrink: 0; }
.speak-btn { background: none; border: none; cursor: pointer; padding: 2px; color: #bbb; transition: color .2s; display: inline-flex; align-items: center; }
.speak-btn:hover { color: var(--green); }
.speak-btn svg { width: 16px; height: 16px; }
.word-def {
    flex: 1; min-width: 0; text-align: center; font-size: 14px;
    color: transparent; transition: color .3s; word-break: break-word; user-select: none;
}
.word-def.show { color: var(--text2); }
.word-row.mastered .word-def, .word-row.difficult .word-def { color: var(--text2) !important; }
.word-row.quiz-row .word-def { color: transparent !important; }
.word-row.quiz-row .word-def.show { color: var(--text2) !important; }
.step-badge { font-size: 10px; font-weight: 700; flex-shrink: 0; background: var(--green); color: #fff; padding: 2px 7px; border-radius: 10px; align-self: center; }
.batch-label { font-size: 10px; color: var(--text3); flex-shrink: 0; background: #f0f0f0; padding: 1px 6px; border-radius: 8px; align-self: center; }
.word-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 10px; }
.act-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #ddd; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; color: #ccc; }
.act-btn svg { width: 16px; height: 16px; }
.act-btn.btn-ok.checked { background: var(--green); border-color: var(--green); color: #fff; }
.act-btn.btn-x.checked  { background: var(--red);   border-color: var(--red);   color: #fff; }
.act-btn.locked { background: #f5f5f5; border-color: #e3e3e3; color: #c8c8c8; cursor: not-allowed; opacity: .65; }
.bottom-bar { flex-shrink: 0; background: var(--card); border-top: 1px solid #eee; z-index: 100; }
.progress-track { height: 3px; background: #eee; }
.progress-fill { height: 100%; background: linear-gradient(90deg,var(--green),#38f9d7); border-radius: 0 3px 3px 0; transition: width .5s ease; width: 0%; }
.bottom-inner { display: flex; align-items: center; padding: 10px 16px; }
.bottom-stats { flex: 1; display: flex; align-items: center; gap: 18px; font-size: 14px; font-weight: 500; }
.stat-item { display: flex; align-items: center; gap: 5px; }
.stat-item svg { width: 16px; height: 16px; }
.stat-item.ok { color: var(--green); }
.stat-item.no { color: var(--red); }
.progress-pct { font-size: 12px; color: var(--text3); margin-right: 12px; }
.submit-btn {
    background: var(--green); color: #fff; border: none;
    border-radius: 22px; padding: 9px 26px; font-size: 14px; font-weight: 600;
    cursor: pointer; box-shadow: 0 2px 10px rgba(76,217,100,.3);
    transition: transform .15s, background .2s; display: flex; align-items: center; gap: 6px;
}
.submit-btn:hover  { background: var(--green-dark); }
.submit-btn:active { transform: scale(.96); }
.submit-btn svg { width: 16px; height: 16px; fill: #fff; }
.empty-state { text-align: center; padding: 70px 20px; color: var(--text3); }
.empty-state svg { width: 56px; height: 56px; color: #d0d0d0; margin-bottom: 16px; }
.empty-state .text { font-size: 14px; }
.empty-state .sub  { font-size: 12px; margin-top: 8px; color: #bbb; }
@media (hover: hover) {
    .word-row:hover { background: #fafafa; }
    .word-row.mastered:hover  { background: #ddf5df; }
    .word-row.difficult:hover { background: #ffe8e6; }
    .word-row.quiz-row:hover  { background: #fafafa; }
    .word-row.quiz-row.revealed:hover { background: #DDF0EB; }
    .act-btn.btn-ok:not(.checked):not(.locked):hover { border-color: var(--green); color: var(--green); }
    .act-btn.btn-x:not(.checked):not(.locked):hover  { border-color: var(--red);   color: var(--red); }
    .tab:hover:not(.active) { background: rgba(255,255,255,.12); }
}
::-webkit-scrollbar { width: 0; }

/* ══════════════════════════════════════════
   管理后台视图（全屏覆盖）
══════════════════════════════════════════ */
#viewAdmin {
    display: none; position: fixed; inset: 0; z-index: 400;
    background: var(--admin-bg); overflow: hidden;
    flex-direction: column;
}
#viewAdmin.active { display: flex; }

/* 管理顶栏 */
.adm-topbar {
    height: 56px; flex-shrink: 0;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--admin-border);
    display: flex; align-items: center; padding: 0 20px; gap: 12px;
}
.adm-logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; color: var(--green-dark); }
.adm-logo svg { width: 22px; height: 22px; fill: var(--green); }
.adm-badge { font-size: 11px; background: var(--green); color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.adm-back {
    margin-left: auto; display: inline-flex; align-items: center; gap: 5px;
    background: var(--green); color: #fff; border: none;
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; transition: background .2s;
}
.adm-back:hover { background: var(--green-dark); }
.adm-back svg { width: 16px; height: 16px; fill: #fff; }

/* 全局统计栏 */
.adm-statbar {
    flex-shrink: 0; background: var(--card);
    border-bottom: 1px solid var(--admin-border);
    display: flex; padding: 10px 20px; gap: 0;
}
.adm-stat { flex: 1; text-align: center; border-right: 1px solid var(--admin-border); padding: 4px 6px; }
.adm-stat:last-child { border-right: none; }
.adm-num { font-size: 20px; font-weight: 700; }
.adm-num.g { color: var(--green-dark); }
.adm-num.o { color: var(--orange); }
.adm-num.b { color: var(--blue); }
.adm-lbl { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* 管理主布局 */
.adm-body { display: flex; flex: 1; overflow: hidden; }

/* 侧边栏 */
.adm-sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--card); border-right: 1px solid var(--admin-border);
    display: flex; flex-direction: column; overflow: hidden;
}
.adm-sidebar-head {
    padding: 12px 16px 10px; font-size: 11px; font-weight: 700;
    color: var(--text3); letter-spacing: .8px; text-transform: uppercase;
    border-bottom: 1px solid var(--admin-border); flex-shrink: 0;
}
.adm-batch-list { flex: 1; overflow-y: auto; }
.adm-batch-item {
    padding: 11px 16px; border-bottom: 1px solid var(--admin-border);
    cursor: pointer; transition: background .15s; position: relative;
}
.adm-batch-item:hover { background: var(--admin-bg); }
.adm-batch-item.active { background: var(--green-bg); }
.adm-batch-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--green); border-radius:0 2px 2px 0; }
.adm-batch-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.adm-batch-meta { font-size: 11px; color: var(--text3); display: flex; gap: 6px; }
.adm-prog-bar { height: 3px; background: #e5e5ea; border-radius: 2px; margin-top: 5px; }
.adm-prog-fill { height: 100%; background: var(--green); border-radius: 2px; }
.adm-sidebar-foot { padding: 12px 16px; border-top: 1px solid var(--admin-border); flex-shrink: 0; }
.adm-import-btn {
    width: 100%; padding: 9px; background: var(--green); color: #fff;
    border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 6px; transition: background .2s;
}
.adm-import-btn:hover { background: var(--green-dark); }
.adm-import-btn svg { width: 17px; height: 17px; fill: #fff; }

/* 管理主区 */
.adm-main { flex: 1; overflow-y: auto; padding: 20px; min-width: 0; }

.adm-detail-head {
    background: var(--card); border-radius: 14px;
    padding: 18px 20px; margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.adm-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.adm-title-input {
    font-size: 18px; font-weight: 700; border: none; outline: none;
    background: transparent; flex: 1; color: var(--text);
    border-bottom: 2px solid transparent; transition: border-color .2s;
}
.adm-title-input:focus { border-bottom-color: var(--green); }
.adm-meta-row { display: flex; align-items: center; gap: 14px; font-size: 13px; color: var(--text3); flex-wrap: wrap; }
.adm-meta-row label { font-weight: 500; color: var(--text2); }
.adm-date-input {
    border: 1px solid var(--admin-border); border-radius: 8px;
    padding: 4px 10px; font-size: 13px; color: var(--text); outline: none; transition: border-color .2s;
}
.adm-date-input:focus { border-color: var(--green); }

/* 通用按钮 */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; border: none; transition: all .2s; white-space: nowrap; }
.btn svg { width: 14px; height: 14px; }
.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-dark); }
.btn-default { background: var(--card); color: var(--text2); border: 1px solid var(--admin-border); }
.btn-default:hover { border-color: var(--green); color: var(--green); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #ffc9c7; }
.btn-danger:hover { background: var(--red); color: #fff; border-color: var(--red); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* 进度小结 */
.adm-chips { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.adm-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--card); border-radius: 10px; padding: 7px 14px;
    font-size: 12px; font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,.06); flex: 1; min-width: 90px;
}
.chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-g { background: var(--green); }
.dot-o { background: var(--orange); }
.dot-b { background: var(--blue); }

/* 单词工具栏 */
.adm-word-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.adm-search {
    flex: 1; min-width: 140px; padding: 7px 14px;
    border: 1px solid var(--admin-border); border-radius: 20px;
    font-size: 13px; outline: none; transition: border-color .2s; background: var(--card);
}
.adm-search:focus { border-color: var(--green); }

/* 单词表 */
.adm-table-wrap { background: var(--card); border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: auto; -webkit-overflow-scrolling: touch; }
.adm-table { width: 100%; min-width: 760px; border-collapse: collapse; }
.adm-table th {
    padding: 10px 14px; font-size: 10px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: .6px; background: #fafafa;
    border-bottom: 1px solid var(--admin-border); text-align: left; white-space: nowrap;
}
.adm-table td { padding: 10px 14px; border-bottom: 1px solid var(--admin-border); font-size: 13px; vertical-align: middle; }
.adm-table tr:last-child td { border-bottom: none; }
.adm-table tr:hover td { background: #fafafa; }
.adm-table tr.tr-done td { background: var(--green-bg); }
.adm-table tr.tr-due td  { background: #fff8f0; }
.step-dots { display: flex; gap: 3px; align-items: center; }
.step-dot { width: 7px; height: 7px; border-radius: 50%; background: #e5e5ea; flex-shrink: 0; }
.step-dot.filled  { background: var(--green); }
.step-dot.current { background: var(--orange); box-shadow: 0 0 0 2px #fff3e0; }
.due-chip { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 8px; }
.due-chip.done   { background: var(--green-bg); color: var(--green-dark); }
.due-chip.due    { background: #fff3e0; color: var(--orange); }
.due-chip.future { background: #f0f4ff; color: var(--blue); }
.review-note { display: block; margin-top: 4px; font-size: 11px; color: var(--text3); white-space: nowrap; }
.icon-btn { width: 28px; height: 28px; border-radius: 8px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
.icon-btn svg { width: 14px; height: 14px; }
.icon-btn.edit   { background: #f0f4ff; color: var(--blue); }
.icon-btn.edit:hover   { background: var(--blue); color: #fff; }
.icon-btn.del    { background: var(--red-bg); color: var(--red); }
.icon-btn.del:hover    { background: var(--red); color: #fff; }
.icon-btn.reset  { background: #f5f5f5; color: var(--text3); }
.icon-btn.reset:hover  { background: #e5e5ea; color: var(--text); }
.icon-act-row { display: flex; gap: 5px; }

.adm-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; color: var(--text3); text-align: center; }
.adm-empty svg { width: 60px; height: 60px; fill: #d1d1d6; margin-bottom: 14px; }
.adm-empty h3 { font-size: 17px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }

/* ══ Modal ══ */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 800; display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
    background: var(--card); border-radius: 18px; padding: 24px;
    width: 100%; max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    transform: scale(.95); transition: transform .2s;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 4px; letter-spacing: .5px; text-transform: uppercase; }
.form-group input,
.form-group textarea {
    width: 100%; padding: 9px 13px;
    border: 1.5px solid var(--admin-border); border-radius: 10px;
    font-size: 14px; outline: none; transition: border-color .2s; color: var(--text);
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--green); }
.form-group textarea { resize: vertical; min-height: 64px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

/* 响应式：小屏侧边栏折叠 */
@media (max-width: 680px) {
    :root { --sidebar-w: 0px; }
    .adm-sidebar { display: none; }
    .adm-topbar { height: auto; min-height: 52px; padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
    .adm-logo { font-size: 15px; min-width: 0; }
    .adm-badge { font-size: 10px; padding: 2px 7px; }
    .adm-back { padding: 7px 12px; font-size: 12px; }
    .adm-statbar { padding: 8px 6px; overflow-x: auto; }
    .adm-stat { flex: 0 0 72px; padding: 3px 4px; }
    .adm-num { font-size: 18px; }
    .adm-main { padding: 12px; }
    .adm-detail-head { border-radius: 12px; padding: 14px; }
    .adm-title-row { flex-wrap: wrap; align-items: stretch; }
    .adm-title-input { flex: 1 1 100%; min-width: 0; font-size: 17px; }
    .adm-title-row .btn { flex: 1 1 calc(50% - 5px); min-width: 0; padding-left: 10px; padding-right: 10px; }
    .adm-meta-row { gap: 8px; }
    .adm-meta-row .btn { flex: 1 1 120px; }
    .adm-chips { gap: 7px; }

/* ══════════════════════════════════════════
   学习日志 / 完成提示 / 设置 / 复习库
══════════════════════════════════════════ */
.modal.log-modal { max-width: 540px; max-height: 88vh; display: flex; flex-direction: column; padding: 22px 22px 18px; }
.log-modal h3 { margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.log-modal h3 svg { width: 18px; height: 18px; fill: var(--green); }
.log-summary {
    display: flex; gap: 10px;
    background: linear-gradient(135deg, var(--green-bg) 0%, #e0f7e7 100%);
    border-radius: 12px; padding: 12px 8px; margin-bottom: 14px;
}
.log-sum-item { flex: 1; text-align: center; }
.log-sum-num { font-size: 22px; font-weight: 700; color: var(--green-dark); line-height: 1.1; }
.log-sum-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }
.log-list {
    flex: 1; overflow-y: auto;
    border: 1px solid var(--admin-border); border-radius: 12px;
    background: #fff; max-height: 56vh;
}
.log-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px; border-bottom: 1px solid var(--border);
    transition: background .15s;
}
.log-row:last-child { border-bottom: none; }
.log-row.empty { background: #fafafa; }
.log-row.today { background: var(--green-bg); }
.log-row.today.empty { background: #fff8ee; }
.log-date-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
.log-date-main { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.log-date-sub { font-size: 11px; color: var(--text3); }
.log-today-tag { font-size: 10px; background: var(--green); color: #fff; padding: 1px 7px; border-radius: 8px; font-weight: 600; letter-spacing: .3px; }
.log-counts { display: flex; gap: 6px; flex-shrink: 0; }
.log-count-chip {
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 10px;
    display: inline-flex; align-items: baseline; gap: 3px;
}
.log-count-chip .num { font-size: 14px; font-weight: 700; }
.log-count-chip.new    { background: rgba(76,217,100,.15); color: var(--green-dark); }
.log-count-chip.review { background: rgba(0,122,255,.12); color: var(--blue); }
.log-empty-text { font-size: 12px; color: #c0c0c0; font-weight: 500; flex-shrink: 0; }
.log-empty-icon { width: 14px; height: 14px; fill: #d8d8d8; vertical-align: -3px; margin-right: 3px; }

/* 完成弹窗 */
.modal.completion-modal { max-width: 380px; text-align: center; padding: 28px 24px 22px; }
.completion-icon {
    width: 72px; height: 72px; margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--green) 0%, #38f9d7 100%);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #fff; box-shadow: 0 8px 28px rgba(76,217,100,.45);
    animation: completePop .5s cubic-bezier(.2,.9,.3,1.3);
}
@keyframes completePop { 0% { transform: scale(.3); opacity:0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity:1; } }
.completion-icon svg { width: 40px; height: 40px; fill: #fff; }
.completion-title { font-size: 19px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.completion-msg { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }
.completion-stats { display: flex; gap: 10px; background: var(--green-bg); border-radius: 12px; padding: 12px; margin-bottom: 16px; }
.completion-stat { flex: 1; text-align: center; }
.completion-stat .num { font-size: 22px; font-weight: 700; color: var(--green-dark); line-height: 1; }
.completion-stat .lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }
.completion-modal .btn { width: 100%; padding: 10px 20px; }

/* 后台：设置 / 库 视图 */
.adm-batch-item.is-special {
    background: linear-gradient(135deg, rgba(255,149,0,.06) 0%, rgba(255,59,48,.04) 100%);
}
.adm-batch-item.is-special.active { background: rgba(255,149,0,.14); }

.adm-sidebar-sublabel {
    padding: 10px 16px 6px; font-size: 10px; font-weight: 700;

/* 设置主区 */
.settings-card {
    background: var(--card); border-radius: 14px;
    padding: 20px; margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.settings-card h3 {
    font-size: 15px; font-weight: 700; color: var(--text);

}
.settings-card h3 svg { width: 18px; height: 18px; fill: var(--blue); }

}
.settings-progress {
    margin-top: 14px; padding: 14px;

.settings-progress-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }

.settings-progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #38f9d7); border-radius: 4px; transition: width .4s; }
.settings-progress-done { margin-top: 8px; font-size: 12px; color: var(--green-dark); font-weight: 600; }

@media (max-width: 520px) {

    .log-sum-num { font-size: 19px; }

    .log-count-chip .num { font-size: 13px; }
    .modal.completion-modal { padding: 24px 18px 18px; }
}
</style>
</head>

/* ══ 日期 ══ */
function dateKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayKey(){ return dateKey(new Date()); }
function addDays(key,n){ const p=key.split('-').map(Number),d=new Date(p[0],p[1]-1,p[2]); d.setDate(d.getDate()+n); return dateKey(d); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtDate(k){ if(!k) return '-'; const p=k.split('-'); return p[1]+'月'+p[2]+'日'; }
function isDone(w){ return w.done||w.step>=REVIEW_TOTAL; }
function hasReviewHistory(w){ return !!w.reviewStartDate||(!w.done&&w.step>0); }
function isReviewing(w){ return !isDone(w)&&hasReviewHistory(w); }
function reviewCount(w){ return Math.min(REVIEW_TOTAL, Math.max(0, w.step||0)); }
function dueDate(start,w){ if(!isReviewing(w)) return null; return addDays(w.reviewStartDate||start,REVIEW_DAYS[Math.min(w.step,REVIEW_TOTAL-1)]); }
function isDue(start,w){ const d=dueDate(start,w); return !!d&&d<=todayKey(); }
function isActiveForStudy(start,w){ return !isDone(w)&&(!isReviewing(w)||isDue(start,w)); }

/* ══ 存储 ══ */
function save(){ localStorage.setItem('uu_data_v3',JSON.stringify(data)); }
function normalizeData(){
    if(!data.forgottenLib||typeof data.forgottenLib!=='object') data.forgottenLib={words:[]};
    if(!Array.isArray(data.forgottenLib.words)) data.forgottenLib.words=[];
    if(!data.dailyLog||typeof data.dailyLog!=='object') data.dailyLog={};
    if(!data.settings||typeof data.settings!=='object') data.settings={};
    if(typeof data.settings.dailyNewTarget!=='number'||data.settings.dailyNewTarget<1) data.settings.dailyNewTarget=DEFAULT_DAILY_NEW_TARGET;
}
function load(){
    const s=localStorage.getItem('uu_data_v3');
    if(s){try{const p=JSON.parse(s);if(p&&Array.isArray(p.batches)){data=p;normalizeData();return;}}catch(e){}}
    // 迁移 v2
    const s2=localStorage.getItem('uu_words_v2');
    if(s2){try{const ws=JSON.parse(s2);if(Array.isArray(ws)&&ws.length){
        data={batches:[{id:uid(),name:'迁移数据',startDate:todayKey(),words:ws.map(w=>({
            word:w.word,def:w.def||'',
            step:(w.review&&typeof w.review.step==='number')?Math.min(w.review.step,REVIEW_TOTAL-1):0,
            done:w.status==='mastered',lastDate:(w.review&&w.review.lastReviewed)||null,reviewStartDate:null
        }))}]};
        normalizeData();save();return;
    }}catch(e){}}
    data={batches:[{id:uid(),name:'示例词汇',startDate:todayKey(),
        words:DEFAULT_WORDS.map(w=>({word:w.word,def:w.def,step:0,done:false,lastDate:null,reviewStartDate:null}))}]};
    normalizeData();
}

function flatWords(){
    const r=[];
    for(const b of data.batches)
        for(let i=0;i<b.words.length;i++)
            r.push({...b.words[i],_bid:b.id,_bname:b.name,_start:b.startDate,_widx:i,_isForgot:false});
    if(data.forgottenLib&&Array.isArray(data.forgottenLib.words)){
        for(let i=0;i<data.forgottenLib.words.length;i++){
            const w=data.forgottenLib.words[i];
            r.push({...w,_bid:FORGOT_LIB_ID,_bname:'遗忘复习库',_start:w.reviewStartDate||todayKey(),_widx:i,_isForgot:true});
        }
    }
    return r;
}
/* 库优先去重：库中存在的词在原批次的副本不再显示，避免同词重复 */
function dedupLibPriority(items){
    const libSet=new Set();
    for(const w of items) if(w._isForgot) libSet.add((w.word||'').toLowerCase());
    if(!libSet.size) return items;
    return items.filter(w=>w._isForgot||!libSet.has((w.word||'').toLowerCase()));
}
function appFiltered(){
    const flat=flatWords();
    if(currentTab==='review') return dedupLibPriority(flat.filter(w=>isDue(w._start,w)));
    if(currentTab==='new'){
        if(!data.batches.length) return [];
        const lat=data.batches[data.batches.length-1];
        const items=lat.words.map((w,i)=>({...w,_bid:lat.id,_bname:lat.name,_start:lat.startDate,_widx:i,_isForgot:false}));
        return showAll ? items : items.filter(w=>!isDone(w)&&!isReviewing(w));
    }
    return showAll ? flat : dedupLibPriority(flat.filter(w=>isActiveForStudy(w._start,w)));
}
function appCounts(){
    const flat=flatWords();
    const done=flat.filter(w=>isDone(w)).length;
    const dueItems=dedupLibPriority(flat.filter(w=>isDue(w._start,w)));
    const due=dueItems.length;
    const lat=data.batches.length?data.batches[data.batches.length-1]:null;
    const newCount=lat?lat.words.filter(w=>!isDone(w)&&!isReviewing(w)).length:0;
    const active=dedupLibPriority(flat.filter(w=>isActiveForStudy(w._start,w))).length;
    return {total:flat.length,done,due,nonDone:active,newCount};
}
function appUpdateStats(){
    const c=appCounts();
    const pct=c.total?Math.round(c.done/c.total*100):0;
    document.getElementById('okCount').textContent=sessionOk;
    document.getElementById('noCount').textContent=sessionNo;
    document.getElementById('progressText').textContent=pct+'%';
    document.getElementById('progressBar').style.width=pct+'%';
    document.getElementById('tabAll').textContent=c.nonDone;
    document.getElementById('tabNew').textContent=c.newCount;
    document.getElementById('tabReview').textContent=c.due;
}
function speak(text){

}
function appRender(){

            '<button class="speak-btn" data-word="'+escHtml(item.word)+'">'+SVG_APP.volume+'</button>'+
            batchLabel+'<span class="word-def'+defCls+'">'+escHtml(item.def)+'</span></div>'+
            '<div class="word-actions">'+
            '<button class="act-btn btn-x'+lockCls+'" data-bid="'+escHtml(item._bid)+'" data-widx="'+item._widx+'">'+SVG_APP.cross+'</button>'+

function revealRow(row, forceSpeak, silent){
    if(!row||!row.classList.contains('quiz-row')) return false;
    const def=row.querySelector('.word-def');
    const was=def&&!def.classList.contains('show');
    if(def) def.classList.add('show');
    row.classList.add('revealed');
    row.querySelectorAll('.act-btn.locked').forEach(b=>b.classList.remove('locked'));
    if(!silent&&(was||forceSpeak)){
        const sp=row.querySelector('.speak-btn');
        if(sp&&sp.dataset.word) speak(sp.dataset.word);
    }
    return was;
}
/* 加入/更新遗忘复习库（按词文本去重，存在则覆盖） */
function addToForgottenLibrary(wordText, def){
    if(!data.forgottenLib) data.forgottenLib={words:[]};
    const lib=data.forgottenLib.words;
    const key=(wordText||'').toLowerCase();
    const idx=lib.findIndex(w=>(w.word||'').toLowerCase()===key);
    const newEntry={word:wordText,def:def||'',step:0,done:false,lastDate:todayKey(),reviewStartDate:todayKey()};
    if(idx>=0){
        const oldEntry={...lib[idx]};
        lib[idx]=newEntry;
        return {idx,existed:true,oldEntry};
    }else{
        lib.push(newEntry);
        return {idx:lib.length-1,existed:false};
    }
}
function logDaily(wasNew, wasReviewing){
    const k=todayKey();
    if(!data.dailyLog[k]) data.dailyLog[k]={newCount:0,reviewCount:0,completionShown:false};
    const e=data.dailyLog[k];
    const before={newCount:e.newCount,reviewCount:e.reviewCount,completionShown:!!e.completionShown};
    if(wasNew) e.newCount++;
    if(wasReviewing) e.reviewCount++;
    return before;
}
function checkDailyNewComplete(){
    const k=todayKey();
    const log=data.dailyLog[k]; if(!log) return;
    const target=data.settings.dailyNewTarget||DEFAULT_DAILY_NEW_TARGET;
    if(log.newCount<target){
        if(log.completionShown){ log.completionShown=false; save(); }
        return;
    }
    if(!log.completionShown){
        log.completionShown=true; save();
        showCompletionModal(log.newCount,log.reviewCount,target);
    }
}
function showCompletionModal(n,r,target){
    const el=document.getElementById('completionModal');
    if(!el) return;
    document.getElementById('completionNew').textContent=n;
    document.getElementById('completionReview').textContent=r;
    const msg=el.querySelector('.completion-msg');
    if(msg) msg.textContent='已完成今日设定的 '+target+' 个新词打卡目标，再接再厉！';
    el.classList.add('show');
}

function markWord(bid,widx,type){
    let word, isLib=(bid===FORGOT_LIB_ID);
    if(isLib){
        if(!data.forgottenLib||!data.forgottenLib.words[widx]) return;
        word=data.forgottenLib.words[widx];
    }else{
        const batch=data.batches.find(b=>b.id===bid);
        if(!batch) return;
        word=batch.words[widx];
        if(!word) return;
    }
    const wasReviewing=isReviewing(word);
    const wasNew=!wasReviewing&&!isDone(word);
    const logBefore=logDaily(wasNew,wasReviewing);

    const snapshot={
        bid,widx,type,isLib,
        src:{step:word.step,done:word.done,lastDate:word.lastDate||null,reviewStartDate:word.reviewStartDate||null,inLib:!!word.inLib},
        lib:null,
        log:logBefore
    };
    word.lastDate=todayKey();

    if(type==='ok'){
        if(hasReviewHistory(word)){
            word.step=Math.min(REVIEW_TOTAL, reviewCount(word)+1);
            word.done=word.step>=REVIEW_TOTAL;
            // 每次答对后从今天起算下一次复习日，确保整行立刻从今日复习/全部列表隐藏（即使原计划已过期）
            word.reviewStartDate=word.done?null:todayKey();
        }else{
            word.step=0;
            word.done=true;
            word.reviewStartDate=null;
        }
        sessionOk++;
    }else{
        if(isLib){
            // 已在库中再次答错：重置进度
            word.step=0;
            word.done=false;
            word.reviewStartDate=todayKey();
        }else{
            // 答错→归入遗忘复习库（按词去重）
            snapshot.lib=addToForgottenLibrary(word.word, word.def);
            // 原批次单词标记为已归入复习库（避免在原批次中重复出现）
            word.step=0;
            word.done=true;
            word.reviewStartDate=null;
            word.inLib=true;
        }
        sessionNo++;
    }
    appHistory.push(snapshot);
    if(appHistory.length>50) appHistory.shift();

    save();
    checkDailyNewComplete();

    const row=document.querySelector('.word-row[data-bid="'+bid+'"][data-widx="'+widx+'"]');
    if(showAll||!row){ appRender(); return; }
    row.classList.add(type==='ok'?'mastered':'difficult');
    const def=row.querySelector('.word-def'); if(def) def.classList.add('show');
    const btn=row.querySelector(type==='ok'?'.btn-ok':'.btn-x'); if(btn) btn.classList.add('checked');
    setTimeout(()=>{ row.classList.add('fade-out'); setTimeout(()=>appRender(),300); },400);
}

document.getElementById('wordList').addEventListener('click',function(e){
    const row=e.target.closest('.word-row');
    const ok=e.target.closest('.btn-ok');
    if(ok){ if(ok.classList.contains('locked')){revealRow(row);return;} markWord(ok.dataset.bid,parseInt(ok.dataset.widx),'ok'); return; }
    const xb=e.target.closest('.btn-x');
    if(xb){ if(xb.classList.contains('locked')){revealRow(row);return;} markWord(xb.dataset.bid,parseInt(xb.dataset.widx),'no'); return; }
    const sp=e.target.closest('.speak-btn');
    if(sp){ revealRow(row,false,true); speak(sp.dataset.word); return; }
    if(row) revealRow(row);
});

document.getElementById('undoBtn').addEventListener('click',function(){
    if(!appHistory.length){ toast('没有可撤销的操作'); return; }
    const last=appHistory.pop();
    // 还原源单词
    let srcWord=null;
    if(last.isLib){
        if(data.forgottenLib&&data.forgottenLib.words[last.widx]) srcWord=data.forgottenLib.words[last.widx];
    }else{
        const batch=data.batches.find(b=>b.id===last.bid);
        if(batch&&batch.words[last.widx]) srcWord=batch.words[last.widx];
    }
    if(srcWord){
        srcWord.step=last.src.step;
        srcWord.done=last.src.done;
        srcWord.lastDate=last.src.lastDate;
        srcWord.reviewStartDate=last.src.reviewStartDate;
        if(last.src.inLib) srcWord.inLib=true; else delete srcWord.inLib;
    }
    // 还原库内变更
    if(last.lib&&data.forgottenLib){
        if(last.lib.existed){
            if(last.lib.oldEntry) data.forgottenLib.words[last.lib.idx]=last.lib.oldEntry;
        }else{
            if(last.lib.idx===data.forgottenLib.words.length-1) data.forgottenLib.words.pop();
        }
    }
    // 还原日志
    const today=todayKey();
    if(last.log&&data.dailyLog[today]){
        data.dailyLog[today].newCount=last.log.newCount;
        data.dailyLog[today].reviewCount=last.log.reviewCount;
        data.dailyLog[today].completionShown=last.log.completionShown;
        if(data.dailyLog[today].newCount===0&&data.dailyLog[today].reviewCount===0) delete data.dailyLog[today];
    }
    if(last.type==='no') sessionNo=Math.max(0,sessionNo-1);
    else sessionOk=Math.max(0,sessionOk-1);
    save(); appRender(); toast('已撤销');
});
document.getElementById('shuffleBtn').addEventListener('click',function(){
    for(const b of data.batches){ const arr=b.words; for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } }
    appRender(); toast('已打乱顺序');
});
document.getElementById('exportBtn').addEventListener('click',function(){

document.getElementById('submitBtn').addEventListener('click',function(){

/* ════════════════════════════════
   学习日志
════════════════════════════════ */
const WEEK_LABEL=['周日','周一','周二','周三','周四','周五','周六'];
function dateAddDays(key,n){
    const p=key.split('-').map(Number); const d=new Date(p[0],p[1]-1,p[2]);
    d.setDate(d.getDate()+n); return dateKey(d);
}
function fmtLogDate(key){
    const p=key.split('-').map(Number); const d=new Date(p[0],p[1]-1,p[2]);
    return (p[1])+'月'+p[2]+'日';
}
function fmtLogYear(key){ return key.split('-')[0]+'年'; }
function dayOfWeek(key){
    const p=key.split('-').map(Number); const d=new Date(p[0],p[1]-1,p[2]);
    return WEEK_LABEL[d.getDay()];
}
function getLogStartKey(){
    let earliest=null;
    for(const k in data.dailyLog){
        if(!earliest||k<earliest) earliest=k;
    }
    for(const b of data.batches){
        if(b.startDate&&(!earliest||b.startDate<earliest)) earliest=b.startDate;
    }
    if(!earliest) earliest=todayKey();
    return earliest;
}
function openLogModal(){
    renderLog();
    document.getElementById('logModal').classList.add('show');
}
function renderLog(){
    const start=getLogStartKey();
    const today=todayKey();
    const days=[]; let cur=today;
    let safety=0;
    while(cur>=start&&safety++<3650){
        days.push(cur);
        cur=dateAddDays(cur,-1);
    }
    let activeDays=0,totalNew=0,totalReview=0;
    for(const k of days){ if(data.dailyLog[k]){ activeDays++; totalNew+=data.dailyLog[k].newCount||0; totalReview+=data.dailyLog[k].reviewCount||0; } }
    const rate=days.length?Math.round(activeDays/days.length*100):0;

    document.getElementById('logSummary').innerHTML=
        '<div class="log-sum-item"><div class="log-sum-num">'+activeDays+'</div><div class="log-sum-lbl">打卡天数</div></div>'+
        '<div class="log-sum-item"><div class="log-sum-num">'+totalNew+'</div><div class="log-sum-lbl">累计新词</div></div>'+
        '<div class="log-sum-item"><div class="log-sum-num">'+totalReview+'</div><div class="log-sum-lbl">累计复习</div></div>'+
        '<div class="log-sum-item"><div class="log-sum-num">'+rate+'%</div><div class="log-sum-lbl">打卡率</div></div>';

    let html='';
    let lastYear='';
    const thisYear=String(new Date().getFullYear());
    for(const k of days){
        const entry=data.dailyLog[k];
        const isToday=(k===today);
        const yr=k.split('-')[0];
        const showYear=(yr!==lastYear&&yr!==thisYear);
        lastYear=yr;
        const dateLabel='<div class="log-date-main">'+fmtLogDate(k)+(isToday?' <span class="log-today-tag">今天</span>':'')+'</div>'+
            '<div class="log-date-sub">'+dayOfWeek(k)+(showYear?' · '+yr+'年':'')+'</div>';
        if(entry&&((entry.newCount||0)+(entry.reviewCount||0)>0)){
            html+='<div class="log-row'+(isToday?' today':'')+'">'+
                '<div class="log-date-block">'+dateLabel+'</div>'+
                '<div class="log-counts">'+
                  '<span class="log-count-chip new"><span class="num">'+(entry.newCount||0)+'</span> 新词</span>'+
                  '<span class="log-count-chip review"><span class="num">'+(entry.reviewCount||0)+'</span> 复习</span>'+
                '</div></div>';

/* ── 解析 TXT ── */
function parseTxt(text){
    if(text.charCodeAt(0)===0xFEFF) text=text.substring(1);
    const lines=text.replace(/\r/g,'').split('\n'), words=[];
    for(const line of lines){
        const l=line.trim(); if(!l||l[0]==='#') continue;
        let parts;
        if(l.includes('/')) parts=l.split(/\s*\/\s*/);
        else if(l.includes('\t')) parts=l.split(/\t+/);
        else if(/\s{3,}/.test(l)) parts=l.split(/\s{3,}/);
        else parts=[l];
        const w=(parts[0]||'').trim(), d=parts.length>1?parts.slice(1).join('/').trim():'';
        if(w) words.push({word:w,def:d,step:0,done:false,lastDate:null,reviewStartDate:null});
    }
    return words;
}
function detectDecode(buf){
    const bytes=new Uint8Array(buf); let start=0;
    if(bytes[0]===0xEF&&bytes[1]===0xBB&&bytes[2]===0xBF) start=3;
    let text; try{ text=new TextDecoder('utf-8').decode(buf.slice(start)); }catch(e){ text=''; }
    let bad=0; const ch=Math.min(text.length,500);
    for(let i=0;i<ch;i++) if(text.charCodeAt(i)===0xFFFD) bad++;
    if(bad>ch*0.05){ try{ text=new TextDecoder('gbk').decode(buf.slice(start)); }catch(e){} }
    return text;
}
function loadPdfJs(){
    return new Promise((res,rej)=>{
        if(window.pdfjsLib){res();return;}
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload=()=>{ if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';res();}else rej(new Error('pdf.js异常')); };
        s.onerror=()=>rej(new Error('无法加载PDF库'));
        document.head.appendChild(s);
    });
}
function extractPdf(buf){
    return loadPdfJs().then(()=>pdfjsLib.getDocument({data:buf}).promise).then(pdf=>{
        const lines=[]; let chain=Promise.resolve();
        for(let p=1;p<=pdf.numPages;p++){(function(pn){
            chain=chain.then(()=>pdf.getPage(pn)).then(pg=>pg.getTextContent()).then(ct=>{
                const its=ct.items.filter(it=>it.str.trim()); if(!its.length) return;
                let cy=its[0].transform[5],cl='';
                its.forEach(it=>{ const y=it.transform[5]; if(Math.abs(y-cy)>5){if(cl.trim())lines.push(cl.trim());cl=it.str;cy=y;}else cl+=it.str; });
                if(cl.trim()) lines.push(cl.trim());
            });
        })(p);}
        return chain.then(()=>parseVocabLines(lines));
    });
}
function parseVocabLines(lines){
    const POS=/^(n\.|adj\.|v\.|adv\.|n\.&v\.|prep\.|conj\.|pron\.)\s*(.*)/;
    const NUM=/^[0-9ODoSKZTlgB]{0,4}[\s.]+/;
    const words=[]; let cur=null,defs=[];
    function sv(){ if(cur&&cur.length>=2){ words.push({word:cur,def:defs.filter(Boolean).join('；').replace(/^[；\s]+|[；\s]+$/g,''),step:0,done:false,lastDate:null,reviewStartDate:null}); } cur=null;defs=[]; }
    function ip(s){ if(s.length>28)return false; if(/^[/'"']/.test(s)||/[/'"']$/.test(s))return true; if(s.length<18&&!/[一-鿿]/.test(s)&&/[/']/.test(s))return true; return false; }
    function isk(s){ return /^\d{1,3}$/.test(s)||s==='Vocabulary'; }
    function cl(s){ return s.replace(NUM,'').replace(/^[网圈]\s*/,'').trim(); }
    for(const raw of lines){
        const line=raw.trim(); if(!line||isk(line)||ip(line)) continue;
        const glue=cl(line).match(/^([a-zA-Z][a-zA-Z\s\-']*?)((?:n\.|adj\.|v\.|adv\.).*)/);
        if(glue&&glue[1].length>=2){ sv(); cur=glue[1].trim(); const pm=glue[2].match(POS); if(pm&&pm[2]) defs.push(pm[1]+pm[2]); continue; }
        const pm=line.match(POS); if(pm){ if(pm[2]) defs.push(pm[1]+pm[2]); continue; }
        const cleaned=cl(line);
        if(/^[a-zA-Z][a-zA-Z\s\-'.]*[a-zA-Z]$/.test(cleaned)&&cleaned.length>=2){ sv(); cur=cleaned; continue; }
        const mix=cleaned.match(/^([a-zA-Z][a-zA-Z\s\-']*[a-zA-Z]+)\s+([一-鿿].*)/);
        if(mix){ sv(); cur=mix[1].trim(); defs.push(mix[2].trim()); continue; }
        if(cur&&/[一-鿿]/.test(line)) defs.push(cleaned);
    }
    sv();
    const seen=new Set();
    return words.filter(w=>{ const k=w.word.toLowerCase(); if(seen.has(k))return false; seen.add(k); return true; });
}
function doImport(words, name, isAdmin){
    if(!words.length){ toast('未识别到单词'); return; }
    const batch={id:uid(),name,startDate:todayKey(),words};
    data.batches.push(batch);
    appHistory=[]; sessionOk=0; sessionNo=0;
    save();
    if(isAdmin){ admSelId=batch.id; admRefresh(); toast('导入成功：'+words.length+' 词 · '+name); }
    else{ currentTab='new'; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelector('[data-tab="new"]').classList.add('active'); appRender(); toast('导入成功：'+words.length+' 词 · '+name); }
}
function handleFileInput(input, isAdmin){
    const f=input.files[0]; if(!f) return;
    const name=f.name.replace(/\.[^.]+$/,'')||('第'+(data.batches.length+1)+'批');
    const reader=new FileReader();
    reader.onload=function(){
        input.value='';
        const buf=reader.result;
        if(!buf||!buf.byteLength){ toast('文件为空'); return; }
        const head=new Uint8Array(buf,0,Math.min(5,buf.byteLength));
        const isPdf=(head[0]===0x25&&head[1]===0x50&&head[2]===0x44&&head[3]===0x46)||f.name.toLowerCase().endsWith('.pdf')||f.type==='application/pdf';
        if(isPdf){ toast('解析PDF中...'); extractPdf(buf).then(ws=>doImport(ws,name,isAdmin)).catch(err=>toast('PDF失败:'+(err.message||''))); }
        else doImport(parseTxt(detectDecode(buf)),name,isAdmin);
    };
    reader.onerror=function(){ input.value=''; toast('读取失败'); };
    reader.readAsArrayBuffer(f);
}

let focusIdx=-1;
document.addEventListener('keydown',function(e){
    if(document.getElementById('viewAdmin').classList.contains('active')) return;
    const items=appFiltered(); if(!items.length) return;
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){
        e.preventDefault();
        focusIdx=e.key==='ArrowDown'?Math.min(focusIdx+1,items.length-1):Math.max(focusIdx-1,0);
        const rows=document.querySelectorAll('.word-row');
        rows.forEach(r=>r.style.outline='none');
        if(rows[focusIdx]){rows[focusIdx].style.outline='2px solid var(--green)';rows[focusIdx].scrollIntoView({block:'nearest'});}
    }
    if(focusIdx<0||focusIdx>=items.length) return;
    const item=items[focusIdx];
    const row=document.querySelectorAll('.word-row')[focusIdx];
    const locked=row&&row.classList.contains('quiz-row')&&!row.classList.contains('revealed');
    if((e.key==='ArrowRight'||e.key==='ArrowLeft')&&locked){e.preventDefault();revealRow(row);return;}
    if(e.key==='ArrowRight'){markWord(item._bid,item._widx,'ok');focusIdx=Math.min(focusIdx,appFiltered().length-1);}
    if(e.key==='ArrowLeft'){markWord(item._bid,item._widx,'no');focusIdx=Math.min(focusIdx,appFiltered().length-1);}
    if(e.key===' '){e.preventDefault();revealRow(row);}
    if(e.key==='Enter') speak(item.word);
    if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();document.getElementById('undoBtn').click();}
});

function admGlobalStats(){
    let total=0,done=0,due=0,upcoming=0;
    for(const b of data.batches){
        for(const w of b.words){
            total++;
            if(isDone(w)){done++;continue;}
            if(isDue(b.startDate,w)) due++; else upcoming++;
        }
    }
    if(data.forgottenLib&&Array.isArray(data.forgottenLib.words)){
        for(const w of data.forgottenLib.words){
            total++;
            if(isDone(w)){done++;continue;}
            const start=w.reviewStartDate||todayKey();
            if(isDue(start,w)) due++; else upcoming++;
        }
    }
    document.getElementById('aStatBatch').textContent=data.batches.length;
    document.getElementById('aStatTotal').textContent=total;
    document.getElementById('aStatDone').textContent=done;
    document.getElementById('aStatDue').textContent=due;
    document.getElementById('aStatUp').textContent=upcoming;
}

            document.getElementById('mEditWord').value=w.word;
            document.getElementById('mEditDef').value=w.def;
            document.getElementById('mEditStep').value=isDone(w)?REVIEW_TOTAL:w.step;
            mEditWidx=wi; mEditFromLib=false; openModal('editModal'); return;
        }
        if(delBtn){
            const wi=parseInt(delBtn.dataset.widx);
            if(!confirm('删除单词"'+batch.words[wi].word+'"？')) return;
            batch.words.splice(wi,1); save(); admRenderMain(); admRenderSidebar(); admGlobalStats(); toast('单词已删除'); return;
        }
        if(resetBtn){
            const wi=parseInt(resetBtn.dataset.widx);
            batch.words[wi].step=0; batch.words[wi].done=false; batch.words[wi].lastDate=null; batch.words[wi].reviewStartDate=null;
            save(); admRenderMain(); admGlobalStats(); toast('已重置: '+batch.words[wi].word); return;
        }
    });
}
/* ── 后台：系统设置 ── */
function admRenderSettings(){
    const area=document.getElementById('admMain');
    const target=data.settings.dailyNewTarget||DEFAULT_DAILY_NEW_TARGET;
    const todayLog=data.dailyLog[todayKey()]||{newCount:0,reviewCount:0};
    const newToday=todayLog.newCount||0;
    const reviewToday=todayLog.reviewCount||0;
    const progressPct=target?Math.min(100,Math.round(newToday/target*100)):0;
    const done=newToday>=target;
    area.innerHTML=
        '<div class="settings-card">'+
            '<h3><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54A.49.49 0 0 0 14 2h-3.84a.49.49 0 0 0-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.49.49 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>每日打卡设置</h3>'+
            '<div class="desc">自定义每日新词学习目标，达成后自动弹出完成提示</div>'+
            '<div class="settings-field">'+
                '<div class="settings-field-info">'+
                    '<div class="settings-field-name">每日新词打卡数量</div>'+
                    '<div class="settings-field-hint">达到此数量时弹出今日任务完成提示</div>'+
                '</div>'+
                '<input type="number" class="settings-num-input" id="setDailyTarget" min="1" max="200" value="'+target+'">'+
            '</div>'+
            '<div class="settings-field">'+
                '<div class="settings-field-info">'+
                    '<div class="settings-field-name">遗忘复习单词数量</div>'+
                    '<div class="settings-field-hint">按艾宾浩斯曲线自动推送，不可自定义</div>'+
                '</div>'+
                '<div class="settings-static">固定（自动）</div>'+
            '</div>'+
            '<div class="settings-progress">'+
                '<div class="settings-progress-head"><span>今日新词进度</span><span><strong>'+newToday+'</strong> / '+target+' 词</span></div>'+
                '<div class="settings-progress-bar"><div class="settings-progress-fill" style="width:'+progressPct+'%"></div></div>'+
                (done?'<div class="settings-progress-done">✓ 今日新词目标已完成（复习 '+reviewToday+' 词）</div>':'')+
            '</div>'+
        '</div>'+
        '<div class="settings-card">'+
            '<h3><svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z"/></svg>学习日志</h3>'+
            '<div class="desc">查阅每日新词与复习数量，未打卡日期自动标注</div>'+
            '<button class="btn btn-primary" id="setOpenLog">打开学习日志</button>'+
        '</div>';
    document.getElementById('setDailyTarget').addEventListener('change',function(){
        let v=parseInt(this.value)||DEFAULT_DAILY_NEW_TARGET;
        if(v<1) v=1; if(v>200) v=200;
        data.settings.dailyNewTarget=v;
        // 若日志已标记完成、新目标更低或更高，重新检测
        const k=todayKey();
        if(data.dailyLog[k]) data.dailyLog[k].completionShown=false;
        save(); admRenderSidebar(); admRenderSettings();
        toast('每日新词目标已更新为 '+v+' 词');
        checkDailyNewComplete();
    });
    document.getElementById('setOpenLog').addEventListener('click',openLogModal);
}

/* ── 后台：遗忘复习库 ── */
function admRenderForgotLib(){
    const area=document.getElementById('admMain');
    const lib=data.forgottenLib&&Array.isArray(data.forgottenLib.words)?data.forgottenLib.words:[];
    const total=lib.length;
    const done=lib.filter(w=>isDone(w)).length;
    const due=lib.filter(w=>isDue(w.reviewStartDate||todayKey(),w)).length;
    const upcoming=total-done-due;
    const filtered=admSearch?lib.map((w,i)=>({...w,_i:i})).filter(w=>w.word.toLowerCase().includes(admSearch)||(w.def||'').includes(admSearch)):lib.map((w,i)=>({...w,_i:i}));
    let rows='';
    for(const w of filtered){
        const isDoneW=isDone(w);
        const start=w.reviewStartDate||todayKey();
        const isDueW=!isDoneW&&isDue(start,w);
        const rowCls=isDoneW?' tr-done':isDueW?' tr-due':'';
        const count=reviewCount(w);
        let chip,reviewNote;
        if(isDoneW){
            chip='<span class="due-chip done">已完成抗遗忘</span>';
            reviewNote='<span class="review-note">已复习 '+REVIEW_TOTAL+'/'+REVIEW_TOTAL+' 次</span>';
        }else{
            const next=fmtDate(dueDate(start,w));
            chip='<span class="due-chip '+(isDueW?'due':'future')+'">'+(isDueW?'今天复习':'下次 '+next)+'</span>';
            reviewNote='<span class="review-note">已复习 '+count+'/'+REVIEW_TOTAL+' 次</span>';
        }
        let dots='';
        for(let i=0;i<REVIEW_TOTAL;i++){
            const cls=isDoneW?'filled':(i<count?'filled':i===count&&isDueW?'current':'');
            dots+='<div class="step-dot'+(cls?' '+cls:'')+'"></div>';
        }
        rows+='<tr class="'+rowCls+'" data-widx="'+w._i+'">'+
            '<td><strong>'+escHtml(w.word)+'</strong></td>'+
            '<td style="color:var(--text2)">'+escHtml(w.def||'')+'</td>'+
            '<td><div class="step-dots">'+dots+'</div><div style="font-size:10px;color:var(--text3);margin-top:2px">'+(isDoneW?REVIEW_TOTAL+'/'+REVIEW_TOTAL:count+'/'+REVIEW_TOTAL)+'</div></td>'+
            '<td>'+chip+reviewNote+'</td>'+
            '<td><div class="icon-act-row">'+
            '<button class="icon-btn edit" data-widx="'+w._i+'" title="编辑"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>'+
            '<button class="icon-btn reset" data-widx="'+w._i+'" title="重置进度"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>'+
            '<button class="icon-btn del" data-widx="'+w._i+'" title="删除"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4h-3.5z"/></svg></button>'+
            '</div></td></tr>';
    }
    area.innerHTML=
        '<div class="adm-detail-head">'+
            '<div class="adm-title-row">'+
                '<div style="flex:1;font-size:18px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px">'+
                  '<svg style="width:22px;height:22px;fill:var(--orange)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>'+
                  '遗忘复习库'+
                '</div>'+
            '</div>'+
            '<div class="adm-meta-row">'+
                '<span>答错的单词自动归入此处（按词去重）· 共 <strong>'+total+'</strong> 词</span>'+
                '<span style="flex:1"></span>'+
                '<button class="btn btn-default btn-sm" id="admLibExport">导出TXT</button>'+
                '<button class="btn btn-danger btn-sm" id="admLibClear">清空库</button>'+
            '</div>'+
        '</div>'+
        '<div class="adm-chips">'+
            '<div class="adm-chip"><div class="chip-dot dot-g"></div>已完成 '+done+' 词</div>'+
            '<div class="adm-chip"><div class="chip-dot dot-o"></div>今日待复习 '+due+' 词</div>'+
            '<div class="adm-chip"><div class="chip-dot dot-b"></div>未到期 '+upcoming+' 词</div>'+
        '</div>'+
        '<div class="adm-word-bar">'+
            '<input type="text" class="adm-search" id="admSearchInput" placeholder="搜索单词或释义..." value="'+escHtml(admSearch)+'">'+
        '</div>'+
        '<div class="adm-table-wrap">'+
            '<table class="adm-table"><thead><tr>'+
            '<th>单词</th><th>释义</th><th>复习进度</th><th>抗遗忘复习</th><th>操作</th>'+
            '</tr></thead><tbody id="admLibTbody">'+
            (rows||'<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text3)">'+(total?'没有匹配的单词':'答错的单词会自动归入此处')+'</td></tr>')+
            '</tbody></table>'+
        '</div>';
    document.getElementById('admSearchInput').addEventListener('input',function(){
        admSearch=this.value.trim().toLowerCase(); admRenderForgotLib();
    });
    document.getElementById('admLibExport').addEventListener('click',function(){
        if(!total){ toast('库内暂无单词'); return; }
        const content=lib.map(w=>w.word+'/'+(w.def||'')).join('\n');
        const blob=new Blob([content],{type:'text/plain;charset=utf-8'});
        const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='遗忘复习库.txt'; a.click();
        toast('已导出 '+total+' 个单词');
    });
    document.getElementById('admLibClear').addEventListener('click',function(){
        if(!total){ toast('库内暂无单词'); return; }
        if(!confirm('确定清空遗忘复习库的全部 '+total+' 个单词？此操作不可撤销。')) return;
        data.forgottenLib.words=[]; save(); admRefresh(); toast('遗忘复习库已清空');
    });
    document.getElementById('admLibTbody').addEventListener('click',function(e){
        const editBtn=e.target.closest('.icon-btn.edit');
        const delBtn=e.target.closest('.icon-btn.del');
        const resetBtn=e.target.closest('.icon-btn.reset');
        if(editBtn){
            const wi=parseInt(editBtn.dataset.widx), w=data.forgottenLib.words[wi];
            document.getElementById('mEditWord').value=w.word;
            document.getElementById('mEditDef').value=w.def||'';
            document.getElementById('mEditStep').value=isDone(w)?REVIEW_TOTAL:w.step;
            mEditWidx=wi; mEditFromLib=true; openModal('editModal'); return;
        }
        if(delBtn){
            const wi=parseInt(delBtn.dataset.widx);
            if(!confirm('从遗忘复习库删除"'+data.forgottenLib.words[wi].word+'"？')) return;
            data.forgottenLib.words.splice(wi,1); save(); admRenderForgotLib(); admRenderSidebar(); admGlobalStats(); toast('已从库中删除'); return;
        }
        if(resetBtn){
            const wi=parseInt(resetBtn.dataset.widx);
            data.forgottenLib.words[wi].step=0; data.forgottenLib.words[wi].done=false;
            data.forgottenLib.words[wi].lastDate=null; data.forgottenLib.words[wi].reviewStartDate=todayKey();
            save(); admRenderForgotLib(); admGlobalStats(); toast('已重置: '+data.forgottenLib.words[wi].word); return;
        }
    });
}

function admRefresh(){ admGlobalStats(); admRenderSidebar(); admRenderMain(); }

/* ── Modal ── */
function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(el=>{
    el.addEventListener('click',function(e){ if(e.target===this) this.classList.remove('show'); });
});
document.getElementById('mEditCancel').addEventListener('click',()=>closeModal('editModal'));
document.getElementById('mAddCancel').addEventListener('click',()=>closeModal('addModal'));
document.getElementById('mEditSave').addEventListener('click',function(){
    const targetArr=mEditFromLib?(data.forgottenLib&&data.forgottenLib.words):(data.batches.find(b=>b.id===admSelId)||{}).words;
    if(!targetArr||!targetArr[mEditWidx]){ mEditFromLib=false; return; }
    const word=document.getElementById('mEditWord').value.trim();
    if(!word){ toast('请输入单词'); return; }
    const step=Math.min(REVIEW_TOTAL,Math.max(0,parseInt(document.getElementById('mEditStep').value)||0));
    const w=targetArr[mEditWidx];
    w.word=word;
    w.def=document.getElementById('mEditDef').value.trim();
    w.step=step>=REVIEW_TOTAL?REVIEW_TOTAL:step;
    w.done=step>=REVIEW_TOTAL;
    w.reviewStartDate=step>0&&step<REVIEW_TOTAL?(w.reviewStartDate||todayKey()):null;
    save(); closeModal('editModal');
    if(mEditFromLib){ admRenderForgotLib(); admRenderSidebar(); admGlobalStats(); }
    else { admRenderMain(); admGlobalStats(); }
    mEditFromLib=false;
    toast('已保存');
});
document.getElementById('mAddSave').addEventListener('click',function(){
    const batch=data.batches.find(b=>b.id===admSelId); if(!batch) return;
    const word=document.getElementById('mAddWord').value.trim();
    if(!word){ toast('请输入单词'); return; }
    batch.words.push({word,def:document.getElementById('mAddDef').value.trim(),step:0,done:false,lastDate:null,reviewStartDate:null});
    save(); closeModal('addModal'); admRenderMain(); admRenderSidebar(); admGlobalStats(); toast('已添加: '+word);
});

/* ── 管理后台导入 ── */
document.getElementById('admUploadFile').addEventListener('change',function(e){ handleFileInput(e.target,true); });

/* ══ 初始化 ══ */
load();
if(data.batches.length) admSelId=data.batches[data.batches.length-1].id;
showView('app');

})();
</script>
